name: otp-ai-mcp
description: 'Otp Ai MCP server. Tools: generate secret, generate totp, verify totp.
  Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: generate_secret
  description: MEOK AI Labs tool.
  parameters:
  - name: issuer
    type: string
    required: false
- name: generate_totp
  description: MEOK AI Labs tool.
  parameters:
  - name: secret
    type: string
    required: true
- name: verify_totp
  description: MEOK AI Labs tool.
  parameters:
  - name: secret
    type: string
    required: true
  - name: code
    type: string
    required: true
- name: generate_qr_uri
  description: MEOK AI Labs tool.
  parameters:
  - name: secret
    type: string
    required: true
  - name: account
    type: string
    required: true
  - name: issuer
    type: string
    required: false
